body:
  text: 小誦經歸命彼世尊應供等覺者一三歸文我歸依佛我歸依法我歸依僧伽我再歸依佛我再歸依法我再歸依僧伽我三再歸依佛我三再歸依法我三再歸依僧伽二十戒文一禁殺生學處我受持二禁不與取學處我受持三禁非梵行學處我受持四禁妄語學處我受持五禁沈醉穀酒果酒酒類學處我受持六禁非時食學處我受持七禁舞誦唱歌音樂觀劇學處我受持八禁持華香薰香塗香扮飾裝飾學處我受持九禁高床大床學處我受持十禁領受金銀學處我受持三三十二身分於此身體有如次者毛髮體毛爪齒外皮肉筋骨骨髓腎臟心臟肝臟肋膜脾肺臟腑腸間膜胃排泄物膽汁痰膿汁血汗脂肪淚血漿唾鼻液關節滑液尿於頭有頭腦四問沙彌文一者為何一切衆生依食而住二者為何名與色三者為何三受四者為何四聖諦五者為何五取蘊六者為何六內處七者為何七菩提分八者為何八支聖道九者為何九衆生居十者為何具足十支謂之阿羅漢五吉祥經如是我聞爾時世尊住舍衛城祇樹給孤獨園其時一甚美之神深夜光輝全祇樹園而近至佛所至已向佛問訊立於一隅立一隅彼神以如是之偈白佛言一多神與衆人祈求最上福思惟於吉祥請佛示説最吉祥二佛言遠避愚癡者交往賢聖人敬應尊敬者此為最吉祥三住於適當所過去積善業己持正誓願此為最吉祥四廣學長技藝善學諸律儀能語彼言辭此為最吉祥五善能事父母養護己妻子安住於生業此為最吉祥六淨行行布施愛護諸親族生業無非難此為最吉祥七遠離諸惡趣緊慎勿飲酒於法無放逸此為最吉祥八虔敬而自遜滿足且知恩隨時聞正法此為最吉祥九謙恭有忍辱詣會於沙門隨時為法談此為最吉祥一修道行梵行審實見聖諦實證於涅槃此為最吉祥一一雖依世間法其心不動搖安穩無憂垢此為最吉祥一二能為如此者何處無不勝到處皆多幸彼等最吉祥六三寶經一集於此處諸鬼神無論地上者空中者一切諸鬼神歡喜熱心聞我之所説二受我教而來是故一切鬼神皆須諦聽垂慈晝夜奉獻供祭之人衆是故有意護彼等三於人間世界或於他世界雖有如何之財寶或則天上之勝寶亦無比擬於如來此於佛為最勝寶此為真理故一切有幸福四寂靜釋迦牟尼世尊已至盡煩惱離貪欲成不死殊勝法任何亦無比擬此法者此亦於法最勝寶此為真理故一切有幸福五最勝之佛所稱讚謂清淨不斷之三昧無有等此三昧者此亦於法最勝寶此為真理故一切有幸福六於諸善人中被稱讚者有八人此等是四雙彼等善逝之弟子有受供養價值人布施此等有大果此亦僧伽最勝寶此為真理故一切有幸福七專念而持堅固心信奉瞿曇之教者何得最高之涅槃入不死獲無償享受寂靜樂此亦僧伽最勝寶此為真理故一切有幸福八譬如市門之巨柱釘入大地時如於四風不動搖我説猶如甚深觀察聖諦人此亦僧伽最勝寶此為真理故一切有幸福九依甚深之智慧善能理解妙説聖諦人則使大為放逸者亦決不受第八生此亦僧伽最勝寶此為真理故一切有幸福一彼俱成就正見捨三事即為身見疑戒禁取見彼離四惡趣不犯六逆罪此亦僧伽最勝寶此為真理故一切有幸福一一彼雖為身語意惡業不於隱匿彼此稱為見涅槃人此亦僧伽最勝寶此為真理故一切有幸福一二猶如夏初林中諸樹之開花如是彼為施最上之利益説至涅槃最勝法此亦於佛最勝寶此為真理故一切有幸福一三最勝而知最勝與最勝運最勝之無上士説最勝之法此亦於佛最勝寶此為真理故一切有幸福一四盡前之生不起新生於未來之生無貪求生斷生之種子不望生長賢人之彼等如燈盡而涅槃此亦僧伽最勝寶此為真理故一切有幸福一五集此處諸鬼神地上者空中者一切諸鬼神如是歸命神人所尊佛願彼等有幸福一六集此處諸鬼神地上者空中者一切諸鬼神如是歸命神人所尊法願彼等有幸福一七集此處諸鬼神地上者空中者一切諸鬼神如是歸命神人所尊僧伽願彼等有幸福七戶外經一彼等於我住家之外立於街路口或往舊有各自家彼等立於門外二緣過去之業受供諸多食飲乃至硬食軟食時此世誰亦無回憶此等之有情者三如是有慈悲之人為有親緣者供以清淨而優勝時與適當之食飲四此為施逝親緣者願親緣者得滿足彼等已逝親屬諸鬼等乃集於此處五對諸多食飲非常之喜悅由彼等諸人受此等之物我等親緣者將得長生六為我等而行供養施主無不得熟果實則在此死世界既無耕作亦無牧畜七亦無商業無以金錢買賣事由此世所受業死之餓鬼世界而存活八如處高之水向低流如是由此世之施物對餓鬼有利益九如溢川流滿諸海如彼由此世之施物對餓鬼有利益一施與我對我為善業彼等以我為親緣者為友為夥伴憶起過去之業為餓鬼行布施一一如是等親者所為之事哭泣悲哀其他嘆息對逝去之鬼不成任何益一二然則將此施物與僧伽告被使用則長久成為死者之利益以善利彼一三此處應被記此為對親緣者之義務向餓鬼行大供養與力於比丘又此對彼等能得不少福八伏藏經一人埋財寶於深穴思生起某事之時將可為助我事二或為王責時或為盜賊奪掠時或為借財之脫困或於飢饉不幸之時為此等之目的所謂世間財寶被蓄積三於深穴中雖何多所埋積然一切常非被有用四財寶由彼處之消失所有者意識之迷惘或為龍持去或為藥叉之取去五或敵於彼不見時繼承者之掘取彼生福盡時此等一切即消失六七無論婦人男子或在支提或在僧伽或在個人新人者或在母父或對兄以布施戒行自制從順如善積財寶八此善積財寶無依力而被奪為死時伴隨物雖捨離此世之富而行此將持行於他世九不得為他分與之寶亦為盜者所不能盜之財寶賢者善行諸福業成為死後隨行之財寶一此乃神人一切快樂之財寶彼等願望者一切由此財寶得一一美美聲麗姿美形權力侍從者一切由此財寶得一二或地方之王權主權轉輪王之悅樂或對諸神天王權一切由此財寶得一三又人間界之幸福或神世界所有之悅樂又涅槃所有之樂亦一切由此財寶得一四擁有修行之善友專心於正理明與解脫具明與解脫之境地一切由此財寶得一五無礙解八解脫聲聞波羅蜜緣覺佛地一切由此財寶得一六成此福業者如是有大不可思議果是故賢人賢者讚福業九慈悲經一完全了解寂靜境善利乃為智人之所為彼堪能率直正直善感柔和無高慢二知足易養生活簡素護根賢明溫和謙虛於信者之家無貪求三不為智者所非難不作任何卑賤行願諸有情有幸福安穩而安樂四諸一切生物或弱或強者或長或大或是中等者或短或細或粗等包括盡無餘五或現或不現或住遠近或已生終或有生因之生物願諸有情有安樂六人勿互毀謗勿輕何處誰勿怒勿氣忿勿互咒願苦七如母護愛獨子賭己命於諸有情修習無邊之慈心八於諸世界修習無限之慈心於上下十方無怨意敵意以達無礙九或立或步或坐或臥只要目醒覺應確立此念於此之教是云梵住一勿陷於妄見護持戒德具有正見制伏貪求欲事彼決不再宿母胎
